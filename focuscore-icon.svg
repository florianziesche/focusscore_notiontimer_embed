<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#2383E2"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="88" stroke="white" stroke-width="8" stroke-opacity="0.2"/>

  <!-- Progress arc (~72%) -->
  <circle cx="128" cy="128" r="88" stroke="white" stroke-width="10" stroke-linecap="round"
    stroke-dasharray="553" stroke-dashoffset="155"
    transform="rotate(-90 128 128)" stroke-opacity="0.95"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="40" stroke="white" stroke-width="4" fill="none" stroke-opacity="0.25"/>

  <!-- Center dot -->
  <circle cx="128" cy="128" r="14" fill="white"/>

  <!-- Cardinal tick marks -->
  <line x1="128" y1="24" x2="128" y2="48" stroke="white" stroke-width="6" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="128" y1="208" x2="128" y2="232" stroke="white" stroke-width="6" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="24" y1="128" x2="48" y2="128" stroke="white" stroke-width="6" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="208" y1="128" x2="232" y2="128" stroke="white" stroke-width="6" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Diagonal tick marks (smaller) -->
  <line x1="55" y1="55" x2="69" y2="69" stroke="white" stroke-width="4" stroke-linecap="round" stroke-opacity="0.2"/>
  <line x1="187" y1="55" x2="201" y2="69" stroke="white" stroke-width="4" stroke-linecap="round" stroke-opacity="0.2"/>
  <line x1="55" y1="201" x2="69" y2="187" stroke="white" stroke-width="4" stroke-linecap="round" stroke-opacity="0.2"/>
  <line x1="187" y1="201" x2="201" y2="187" stroke="white" stroke-width="4" stroke-linecap="round" stroke-opacity="0.2"/>
</svg>
