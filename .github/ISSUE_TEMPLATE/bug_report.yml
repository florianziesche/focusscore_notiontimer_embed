name: Bug Report
description: Report a bug in Focus Score
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: When I click the finish button, the timer shows NaN...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open Focus Score
        2. Start a timer without an estimate
        3. Click finish immediately
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Timer
        - Notion Integration
        - Music Player
        - Statistics
        - Settings
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Chrome 124 on macOS 15"
  - type: dropdown
    id: hosting
    attributes:
      label: Hosting Mode
      options:
        - Vercel
        - Cloudflare Worker
        - Local file
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, console errors, or anything else relevant.
