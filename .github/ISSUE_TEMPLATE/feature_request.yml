name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate feature suggestions. Please describe what you need.
  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: I often forget to check my timer because there's no visual cue when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Timer
        - Notion Integration
        - Music Player
        - Statistics / XP
        - Settings / Config
        - Design / UI
        - Other
